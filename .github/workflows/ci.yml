name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2

      - name: Build
        run: ./gradlew build --no-daemon

      - name: Upload build reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports
          path: |
            **/build/reports/
            **/build.gradle.kts.d/

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { repo, issue } = context;
            
            let body = '## CI 构建失败\n\n';
            body += '**触发时间**: ' + new Date().toISOString() + '\n';
            body += '**分支**: ' + process.env.GITHUB_REF + '\n';
            body += '**Commit**: ' + process.env.GITHUB_SHA + '\n\n';
            body += '### 错误信息\n\n';
            body += '```\n';
            body += '构建失败，请查看 CI 日志获取详细信息\n';
            body += '```\n\n';
            body += '### 自动修复\n\n';
            body += '此 issue 由 CI 自动创建，AI 正在分析问题并准备修复。\n';
            body += '请勿手动关闭此 issue。\n';
            
            const { data: issues } = await github.rest.issues.listForRepo({
              ...repo,
              state: 'open',
              labels: ['ci-failure', 'automated']
            });
            
            const existingIssue = issues.find(i => 
              i.title.includes('CI 构建失败') && 
              !i.body.includes('已修复')
            );
            
            if (!existingIssue) {
              const { data: newIssue } = await github.rest.issues.create({
                ...repo,
                title: '🤖 CI 构建失败 - ' + process.env.GITHUB_REF?.split('/').pop(),
                body: body,
                labels: ['ci-failure', 'automated', 'needs-fix']
              });
              console.log('Created issue:', newIssue.number);
            } else {
              console.log('Issue already exists:', existingIssue.number);
            }
